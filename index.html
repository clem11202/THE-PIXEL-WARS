<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>THE PIXEL WAR - SOCIAL 🏆</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Arial', sans-serif; color: white; }
        canvas { cursor: crosshair; image-rendering: pixelated; }
        
        /* Menus */
        #login-screen { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #leaderboard { position: fixed; top: 15px; right: 15px; background: rgba(0,0,0,0.8); border: 2px solid gold; padding: 10px; border-radius: 8px; font-size: 12px; width: 150px; }
        #side-menu { position: fixed; left: 15px; top: 15px; bottom: 15px; width: 200px; background: rgba(0,0,0,0.9); border: 2px solid #ff4444; padding: 10px; border-radius: 10px; z-index: 100; }
        
        .btn { display: block; width: 100%; padding: 8px; margin: 5px 0; background: #222; color: #eee; border: 1px solid #444; cursor: pointer; border-radius: 4px; font-size: 11px; }
        .btn:hover { background: #444; }
        .stat-val { color: #0f0; font-weight: bold; font-size: 20px; }
        input[type="text"] { padding: 10px; border-radius: 5px; border: none; margin-bottom: 10px; width: 200px; }
    </style>
</head>
<body>

<div id="login-screen">
    <h1>THE PIXEL WAR ⚔️</h1>
    <input type="text" id="username" placeholder="Ton Pseudo...">
    <button class="btn" style="width: 220px; font-size: 16px;" onclick="login()">REJOINDRE LA GUERRE</button>
</div>

<div id="leaderboard">
    <div style="text-align:center; font-weight:bold; color:gold; margin-bottom:5px;">🏆 TOP 5</div>
    <div id="leader-list">Chargement...</div>
</div>

<div id="side-menu">
    <h3 style="color:#ff4444; margin-top:0;">BASE DE CLAN</h3>
    <div id="player-name" style="font-weight:bold; color:cyan;">---</div>
    <hr border="0.5">
    <p>Pixels: <span id="pixelCount" class="stat-val">0</span></p>
    <p>Revenu: <span id="mpsCount" style="color:cyan">+1/s</span></p>
    
    <div style="font-size:12px; color:gold; margin-top:20px;">BOUTIQUE</div>
    <button class="btn" onclick="buyBot(5, 100)">🤖 ACHETER B-BOT (100px)</button>
    <button class="btn" style="border-color:gold" onclick="alert('Bientôt : Soutenir le créateur !')">🎁 SOUTENIR CLEM</button>
    
    <div style="margin-top:20px;">
        <input type="color" id="colorPicker" value="#ff4444" style="width:100%; height:40px; cursor:pointer;">
    </div>
</div>

<canvas id="gameCanvas"></canvas>

<script>
    // Config Firebase
    const firebaseConfig = { databaseURL: "https://the-pixel-war-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let user = "", pixels = 0, mps = 0, pixelsMap = {}, bots = [];
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    let width = canvas.width = window.innerWidth, height = canvas.height = window.innerHeight;
    let camera = { x: 500, y: 500, zoom: 0.5 };

    function login() {
        user = document.getElementById('username').value.trim();
        if(user.length < 2) return alert("Pseudo trop court !");
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('player-name').innerText = user;
        
        // Charger ou créer les données du joueur
        db.ref('users/' + user).on('value', s => {
            const data = s.val() || { pixels: 10, mps: 0 };
            pixels = data.pixels;
            mps = data.mps;
        });
    }

    // Leaderboard
    db.ref('users').orderByChild('pixels').limitToLast(5).on('value', s => {
        let list = "";
        const players = [];
        s.forEach(p => { players.push({n: p.key, v: p.val().pixels}); });
        players.reverse().forEach((p, i) => {
            list += `<div>${i+1}. ${p.n} (${Math.floor(p.v)})</div>`;
        });
        document.getElementById('leader-list').innerHTML = list;
    });

    // Map Sync
    db.ref('map').on('value', s => { pixelsMap = s.val() || {}; });
    db.ref('bots').on('value', s => { 
        const val = s.val() || {};
        bots = Object.values(val);
    });

    function buyBot(power, price) {
        if(pixels >= price) {
            pixels -= price;
            mps += power;
            // Placer un bot mignon aléatoirement
            const botPos = { x: Math.random()*980, y: Math.random()*980, owner: user };
            db.ref('bots').push(botPos);
            save();
        }
    }

    function save() {
        if(user) db.ref('users/' + user).set({ pixels, mps });
    }

    // Boucle de gain et dessin
    setInterval(() => {
        if(user) {
            pixels += (1 + mps);
            document.getElementById('pixelCount').innerText = Math.floor(pixels);
            document.getElementById('mpsCount').innerText = "+" + (1+mps) + "/s";
            save();
        }
    }, 1000);

    function drawBot(x, y) {
        // Corps
        ctx.fillStyle = "#333"; ctx.fillRect(x*1, y*1, 20, 20);
        // Yeux mignons
        ctx.fillStyle = "#0f0"; 
        ctx.fillRect(x+4, y+5, 4, 4); ctx.fillRect(x+12, y+5, 4, 4);
        // Antenne
        ctx.strokeStyle = "#fff"; ctx.strokeRect(x+9, y-4, 2, 4);
    }

    function draw() {
        ctx.fillStyle = "#111"; ctx.fillRect(0,0,width,height);
        ctx.save();
        ctx.translate(width/2, height/2); ctx.scale(camera.zoom, camera.zoom); ctx.translate(-camera.x, -camera.y);
        
        // La Map 1000x1000
        ctx.fillStyle = "#000"; ctx.fillRect(0,0,1000,1000);
        ctx.strokeStyle = "#333"; ctx.strokeRect(0,0,1000,1000);

        for(let p in pixelsMap) {
            let [px,py] = p.split('_').map(Number);
            ctx.fillStyle = pixelsMap[p]; ctx.fillRect(px, py, 1, 1);
        }
        
        // Dessiner les Bots
        bots.forEach(b => drawBot(b.x, b.y));

        ctx.restore();
        requestAnimationFrame(draw);
    }

    canvas.addEventListener('click', e => {
        if(!user) return;
        const wx = (e.clientX-width/2)/camera.zoom + camera.x;
        const wy = (e.clientY-height/2)/camera.zoom + camera.y;
        if(wx >= 0 && wx < 1000 && wy >= 0 && wy < 1000) {
            db.ref('map/' + Math.floor(wx) + '_' + Math.floor(wy)).set(document.getElementById('colorPicker').value);
        }
    });

    draw();
</script>
</body>
</html>
